name: Rating Engine
on: workflow_call

env:
  CI: true
  APP_REPOSITORY_NAME: rating-engine

jobs:
  set-build-matrix:
    name: Set Deployment Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-build-matrix.outputs.matrix }}
      matrixLength: ${{ steps.set-build-matrix.outputs.matrixLength }}
      packageMatrix: ${{ steps.set-build-matrix.outputs.packageMatrix }}

    defaults:
      run:
        working-directory: components/rating_engine

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Deployment Matrix
        id: set-build-matrix
        run: |
          branchName=$(echo '${{ github.ref }}' | sed 's,refs/heads/,,g')
          matrixSource=$(cat << EOF
          [
            {
              "identifier": "rating-engine-staging",
              "branch": "develop",
              "friendly_image_tag": "beta",
              "image_tag": "stag-${{ github.sha }}"
            },
            {
              "identifier": "rating-engine",
              "branch": "master",
              "friendly_image_tag": "latest",
              "image_tag": "prod-${{ github.sha }}"
            }
          ]
          EOF
          )
          matrix=$(echo $matrixSource | jq --arg branchName "$branchName" 'map(. | select((.branch==$branchName)) )')
          echo "matrix={\"include\":$(echo $matrix)}" >> $GITHUB_OUTPUT
          echo "matrixLength=$(echo $matrix | jq length)" >> $GITHUB_OUTPUT
          echo "packageMatrix={\"platform\":[{\"arch\":\"amd64\",\"runner\":\"ubuntu-latest\"},{\"arch\":\"arm64\",\"runner\":\"ubuntu-24.04-arm\"}],\"include\":$(echo $matrix)}" >> $GITHUB_OUTPUT

  build-packages:
    name: Build Packages
    if: needs.set-build-matrix.outputs.matrixLength > 0

    strategy:
      matrix: ${{fromJSON(needs.set-build-matrix.outputs.packageMatrix)}}
      fail-fast: false

    runs-on: ${{ matrix.platform.runner }}
    needs:
      - set-build-matrix

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-skip-session-tagging: true
          role-duration-seconds: 3600
          aws-region: ap-southeast-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to ECR
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ECR_REGISTRY }}

      - name: Build and push app image
        uses: docker/build-push-action@v7
        with:
          push: true
          context: components/rating_engine
          platforms: linux/${{ matrix.platform.arch }}
          cache-from: type=gha,scope=${{ env.APP_REPOSITORY_NAME }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ env.APP_REPOSITORY_NAME }}-${{ matrix.platform.arch }}
          provenance: false
          tags: |
            ${{ secrets.ECR_REGISTRY }}/${{ env.APP_REPOSITORY_NAME }}:${{ matrix.image_tag }}-${{ matrix.platform.arch }}
            ${{ secrets.GHCR_REGISTRY }}/${{ env.APP_REPOSITORY_NAME }}:${{ matrix.friendly_image_tag }}-${{ matrix.platform.arch }}

      - name: Build and push debug image
        uses: docker/build-push-action@v7
        with:
          push: true
          context: components/rating_engine
          platforms: linux/${{ matrix.platform.arch }}
          cache-from: type=gha,scope=${{ env.APP_REPOSITORY_NAME }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ env.APP_REPOSITORY_NAME }}-${{ matrix.platform.arch }}
          target: debug
          provenance: false
          tags: |
            ${{ secrets.GHCR_REGISTRY }}/${{ env.APP_REPOSITORY_NAME }}:${{ matrix.friendly_image_tag }}-debug-${{ matrix.platform.arch }}

  build-manifest:
    name: Build Manifest
    runs-on: ubuntu-latest

    needs:
      - set-build-matrix
      - build-packages

    strategy:
      matrix: ${{fromJSON(needs.set-build-matrix.outputs.matrix)}}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-skip-session-tagging: true
          role-duration-seconds: 3600
          aws-region: ap-southeast-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ECR
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ECR_REGISTRY }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Manifest
        run: |
          declare -a platforms=("amd64" "arm64")
          declare -a repositories=("${{ env.APP_REPOSITORY_NAME }}")

          for repository in "${repositories[@]}"
          do
            source_images=$(printf "${{ secrets.ECR_REGISTRY }}/$repository:${{ matrix.image_tag }}-%s " "${platforms[@]}")
            docker buildx imagetools create -t ${{ secrets.ECR_REGISTRY }}/$repository:${{ matrix.friendly_image_tag }} -t ${{ secrets.ECR_REGISTRY }}/$repository:${{ matrix.image_tag }} $source_images

            source_images=$(printf "${{ secrets.GHCR_REGISTRY }}/$repository:${{ matrix.friendly_image_tag }}-%s " "${platforms[@]}")
            docker buildx imagetools create -t ${{ secrets.GHCR_REGISTRY }}/$repository:${{ matrix.friendly_image_tag }} $source_images

            source_images=$(printf "${{ secrets.GHCR_REGISTRY }}/$repository:${{ matrix.friendly_image_tag }}-debug-%s " "${platforms[@]}")
            docker buildx imagetools create -t ${{ secrets.GHCR_REGISTRY }}/$repository:${{ matrix.friendly_image_tag }}-debug $source_images
          done
