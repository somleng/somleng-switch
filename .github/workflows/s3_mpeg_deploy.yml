name: Deploy S3 MPEG
on:
  workflow_call:
    inputs:
      buildConfig:
        required: true
        type: string

env:
  CI: true
  REPOSITORY_NAME: s3-mpeg

jobs:
  set-deployment-matrix:
    name: Set Deployment Matrix
    runs-on: ubuntu-latest
    outputs:
      deployMatrix: ${{ steps.set-deployment-matrix.outputs.deployMatrix }}
    steps:
      - name: Set Deployment Matrix
        id: set-deployment-matrix
        run: |
          buildConfig=${{ toJSON(inputs.buildConfig) }}
          matrixSource=$(cat << EOF
          [
            {
              "environment": "staging",
              "identifier": "s3-mpeg-staging"
            },
            {
              "environment": "production",
              "identifier": "s3-mpeg"
            }
          ]
          EOF
          )
          matched=$(echo "$matrixSource" | jq --argjson bc "$buildConfig" 'map(select(.environment == $bc.environment)) | .[0]')
          mergedConfig=$(jq -n --argjson a "$buildConfig" --argjson b "$matched" '$b + $a')
          mergedConfig=$(echo "$mergedConfig" | jq '. + {arch: "arm64"}')
          mergedConfig=$(echo "$mergedConfig" | jq -c '.')
          echo "deployMatrix={\"region\":[\"ap-southeast-1\"],\"include\":[$mergedConfig]}" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - set-deployment-matrix

    strategy:
      matrix: ${{fromJson(needs.set-deployment-matrix.outputs.deployMatrix)}}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        id: aws-login
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-skip-session-tagging: true
          role-duration-seconds: 3600
          aws-region: ${{ matrix.region }}

      - name: Deploy Lambda
        run: |
          aws lambda update-function-code --function-name ${{ matrix.identifier }} \
                                          --image-uri ${{ secrets.ECR_REGISTRY }}/${{ env.REPOSITORY_NAME }}:${{ matrix.image_tag }}-${{ matrix.arch }} \
                                          --architectures "${{ matrix.arch }}" \
                                          --publish
      - name: Create Sentry release
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: somleng
          SENTRY_PROJECT: s3-mpeg
        with:
          environment: ${{ matrix.environment }}
