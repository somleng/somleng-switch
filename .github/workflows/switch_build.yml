name: Switch Build

on:
  workflow_call:
    inputs:
      build-matrix:
        required: true
        type: string

env:
  CI: true
  APP_REPOSITORY_NAME: switch-app
  RATING_ENGINE_REPOSITORY_NAME: rating-engine
  WEBSERVER_REPOSITORY_NAME: switch-webserver
  FREESWITCH_REPOSITORY_NAME: freeswitch
  FREESWITCH_STATS_LOGGER_REPOSITORY_NAME: freeswitch-stats-logger
  FREESWITCH_EVENT_PROCESSOR_REPOSITORY_NAME: freeswitch-event-processor

jobs:
  set-build-matrix:
    name: Set Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-build-matrix.outputs.packageMatrix }}
      packageMatrix: ${{ steps.set-build-matrix.outputs.packageMatrix }}
    steps:
      - name: Set Deployment Matrix
        id: set-build-matrix
        run: |
          matrixSource=$(cat << EOF
          [
            {
              "environment": "staging",
              "identifier": "switch-staging",
            },
            {
              "environment": "production",
              "identifier": "switch"
            }
          ]
          EOF
          )

          echo ${{ inputs.build-matrix }}

          matrix=$(echo $matrixSource | jq --arg environment "${{ inputs.build-matrix.environment }}" 'map(. | select((.environment==${{ inputs.build-matrix.environment }})) )')
          matrix=$(jq -n --argjson o1 "${{ inputs.build-matrix }}" --argjson o2 "$matrix" '$o1 + $o2')
          echo $matrix
          echo "matrix={\"include\":$(echo $matrix)}" >> $GITHUB_OUTPUT
          echo "packageMatrix={\"platform\":[{\"arch\":\"amd64\",\"runner\":\"ubuntu-latest\"},{\"arch\":\"arm64\",\"runner\":\"ubuntu-24.04-arm\"}],\"include\":$(echo $matrix)}" >> $GITHUB_OUTPUT

  build-packages:
    name: Build Packages

    strategy:
      matrix: ${{fromJSON(needs.set-build-matrix.outputs.packageMatrix)}}
      fail-fast: false

    runs-on: ${{ matrix.platform.runner }}
    needs:
      - set-build-matrix

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-skip-session-tagging: true
          role-duration-seconds: 3600
          aws-region: ap-southeast-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to ECR
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ECR_REGISTRY }}

      - name: Export Polly Voices
        run: |
          components/freeswitch/bin/export_tts_voices > components/freeswitch/conf/autoload_configs/tts_voices.xml

      - name: Build and push app image
        uses: docker/build-push-action@v7
        with:
          push: true
          context: components/app
          platforms: linux/${{ matrix.platform.arch }}
          cache-from: type=gha,scope=${{ env.APP_REPOSITORY_NAME }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ env.APP_REPOSITORY_NAME }}-${{ matrix.platform.arch }}
          provenance: false
          tags: |
            ${{ secrets.ECR_REGISTRY }}/${{ env.APP_REPOSITORY_NAME }}:${{ matrix.image_tag }}-${{ matrix.platform.arch }}
            ${{ secrets.GHCR_REGISTRY }}/${{ env.APP_REPOSITORY_NAME }}:${{ matrix.friendly_image_tag }}-${{ matrix.platform.arch }}

      - name: Build and push webserver image
        uses: docker/build-push-action@v7
        with:
          push: true
          context: components/nginx
          platforms: linux/${{ matrix.platform.arch }}
          cache-from: type=gha,scope=${{ env.WEBSERVER_REPOSITORY_NAME }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ env.WEBSERVER_REPOSITORY_NAME }}-${{ matrix.platform.arch }}
          provenance: false
          tags: |
            ${{ secrets.ECR_REGISTRY }}/${{ env.WEBSERVER_REPOSITORY_NAME }}:${{ matrix.image_tag }}-${{ matrix.platform.arch }}
            ${{ secrets.GHCR_REGISTRY }}/${{ env.WEBSERVER_REPOSITORY_NAME }}:${{ matrix.friendly_image_tag }}-${{ matrix.platform.arch }}

      - name: Build and push FreeSWITCH image
        uses: docker/build-push-action@v7
        with:
          push: true
          context: components/freeswitch
          build-args: |
            signalwire_token=${{ secrets.SIGNALWIRE_TOKEN }}
          platforms: linux/${{ matrix.platform.arch }}
          cache-from: type=gha,scope=${{ env.FREESWITCH_REPOSITORY_NAME }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ env.FREESWITCH_REPOSITORY_NAME }}-${{ matrix.platform.arch }}
          provenance: false
          tags: |
            ${{ secrets.ECR_REGISTRY }}/${{ env.FREESWITCH_REPOSITORY_NAME }}:${{ matrix.image_tag }}-${{ matrix.platform.arch }}
            ${{ secrets.GHCR_REGISTRY }}/${{ env.FREESWITCH_REPOSITORY_NAME }}:${{ matrix.friendly_image_tag }}-${{ matrix.platform.arch }}

      - name: Build and push FreeSWITCH Stats Logger image
        uses: docker/build-push-action@v7
        with:
          push: true
          context: components/freeswitch_stats_logger
          platforms: linux/${{ matrix.platform.arch }}
          cache-from: type=gha,scope=${{ env.FREESWITCH_STATS_LOGGER_REPOSITORY_NAME }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ env.FREESWITCH_STATS_LOGGER_REPOSITORY_NAME }}-${{ matrix.platform.arch }}
          provenance: false
          tags: |
            ${{ secrets.ECR_REGISTRY }}/${{ env.FREESWITCH_STATS_LOGGER_REPOSITORY_NAME }}:${{ matrix.image_tag }}-${{ matrix.platform.arch }}
            ${{ secrets.GHCR_REGISTRY }}/${{ env.FREESWITCH_STATS_LOGGER_REPOSITORY_NAME }}:${{ matrix.friendly_image_tag }}-${{ matrix.platform.arch }}

      - name: Build and push FreeSWITCH Event Processor image
        uses: docker/build-push-action@v7
        with:
          push: true
          context: components/freeswitch_event_processor
          platforms: linux/${{ matrix.platform.arch }}
          cache-from: type=gha,scope=${{ env.FREESWITCH_EVENT_PROCESSOR_REPOSITORY_NAME }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ env.FREESWITCH_EVENT_PROCESSOR_REPOSITORY_NAME }}-${{ matrix.platform.arch }}
          provenance: false
          tags: |
            ${{ secrets.ECR_REGISTRY }}/${{ env.FREESWITCH_EVENT_PROCESSOR_REPOSITORY_NAME }}:${{ matrix.image_tag }}-${{ matrix.platform.arch }}
            ${{ secrets.GHCR_REGISTRY }}/${{ env.FREESWITCH_EVENT_PROCESSOR_REPOSITORY_NAME }}:${{ matrix.friendly_image_tag }}-${{ matrix.platform.arch }}

  build-manifest:
    name: Build Manifest
    runs-on: ubuntu-latest

    needs:
      - set-build-matrix
      - build-packages

    strategy:
      matrix: ${{fromJSON(needs.set-build-matrix.outputs.matrix)}}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-skip-session-tagging: true
          role-duration-seconds: 3600
          aws-region: ap-southeast-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ECR
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ECR_REGISTRY }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Manifest
        run: |
          declare -a platforms=("amd64" "arm64")
          declare -a repositories=("${{ env.APP_REPOSITORY_NAME }}" "${{ env.WEBSERVER_REPOSITORY_NAME }}" "${{ env.FREESWITCH_REPOSITORY_NAME }}" "${{ env.FREESWITCH_STATS_LOGGER_REPOSITORY_NAME }}" "${{ env.FREESWITCH_EVENT_PROCESSOR_REPOSITORY_NAME }}")

          for repository in "${repositories[@]}"
          do
            source_images=$(printf "${{ secrets.ECR_REGISTRY }}/$repository:${{ matrix.image_tag }}-%s " "${platforms[@]}")
            docker buildx imagetools create -t ${{ secrets.ECR_REGISTRY }}/$repository:${{ matrix.friendly_image_tag }} -t ${{ secrets.ECR_REGISTRY }}/$repository:${{ matrix.image_tag }} $source_images

            source_images=$(printf "${{ secrets.GHCR_REGISTRY }}/$repository:${{ matrix.friendly_image_tag }}-%s " "${platforms[@]}")
            docker buildx imagetools create -t ${{ secrets.GHCR_REGISTRY }}/$repository:${{ matrix.friendly_image_tag }} $source_images
          done
