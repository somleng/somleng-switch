name: Build
on: push

env:
  CI: true

jobs:
  s3-mpeg-tests:
    uses: ./.github/workflows/s3_mpeg_tests.yml
    secrets: inherit

  services-tests:
    uses: ./.github/workflows/services_tests.yml
    secrets: inherit

  switch-tests:
    uses: ./.github/workflows/switch_tests.yml
    secrets: inherit

  integration-tests:
    uses: ./.github/workflows/integration_tests.yml
    secrets: inherit

  set-build-matrix:
    name: Set Build Matrix
    runs-on: ubuntu-latest
    outputs:
      buildConfig: ${{ steps.set-build-matrix.outputs.buildConfig }}
      buildConfigLength: ${{ steps.set-build-matrix.outputs.buildConfigLength }}
      buildMatrix: ${{ steps.set-build-matrix.outputs.buildMatrix }}
      amd64PackageMatrix: ${{ steps.set-build-matrix.outputs.amd64PackageMatrix }}
      arm64PackageMatrix: ${{ steps.set-build-matrix.outputs.arm64PackageMatrix }}
      multiArchPackageMatrix: ${{ steps.set-build-matrix.outputs.multiArchPackageMatrix }}

    steps:
      - name: Set Build Matrix
        id: set-build-matrix
        run: |
          branchName=$(echo '${{ github.ref }}' | sed 's,refs/heads/,,g')
          matrixSource=$(cat << EOF
          [
            {
              "branch": "improve_ci",
              "environment": "staging",
              "friendly_image_tag": "beta",
              "image_tag": "stag-${{ github.sha }}"
            },
            {
              "branch": "master",
              "environment": "production",
              "friendly_image_tag": "latest",
              "image_tag": "prod-${{ github.sha }}"
            }
          ]
          EOF
          )

          matchedArray=$(echo "$matrixSource" | jq -c --arg branchName "$branchName" 'map(select(.branch==$branchName))')
          buildConfigLength=$(echo "$matchedArray" | jq 'length')
          buildConfig=$(echo "$matchedArray" | jq -c '.[0]')
          echo "buildConfig=$buildConfig" >> $GITHUB_OUTPUT
          echo "buildConfigLength=$buildConfigLength" >> $GITHUB_OUTPUT
          echo "buildMatrix={\"include\":[$buildConfig]}" >> $GITHUB_OUTPUT
          echo "amd64PackageMatrix={\"platform\":[{\"arch\":\"amd64\",\"runner\":\"ubuntu-latest\"}],\"include\":[$buildConfig]}" >> $GITHUB_OUTPUT
          echo "arm64PackageMatrix={\"platform\":[{\"arch\":\"arm64\",\"runner\":\"ubuntu-24.04-arm\"}],\"include\":[$buildConfig]}" >> $GITHUB_OUTPUT
          echo "multiArchPackageMatrix={\"platform\":[{\"arch\":\"amd64\",\"runner\":\"ubuntu-latest\"},{\"arch\":\"arm64\",\"runner\":\"ubuntu-24.04-arm\"}],\"include\":[$buildConfig]}" >> $GITHUB_OUTPUT

  build-switch:
    uses: ./.github/workflows/switch_build.yml
    needs: [set-build-matrix, switch-tests]
    if: needs.set-build-matrix.outputs.buildConfigLength > 0
    secrets: inherit
    with:
      buildMatrix: ${{ needs.set-build-matrix.outputs.buildMatrix }}
      packageMatrix: ${{ needs.set-build-matrix.outputs.multiArchPackageMatrix }}

  build-rating-engine:
    uses: ./.github/workflows/rating_engine_build.yml
    needs: [set-build-matrix]
    if: needs.set-build-matrix.outputs.buildConfigLength > 0
    secrets: inherit
    with:
      buildMatrix: ${{ needs.set-build-matrix.outputs.buildMatrix }}
      packageMatrix: ${{ needs.set-build-matrix.outputs.multiArchPackageMatrix }}

  deploy-switch:
    uses: ./.github/workflows/switch_deploy.yml
    needs: [set-build-matrix, build-switch, build-rating-engine]
    secrets: inherit
    with:
      buildConfig: ${{ needs.set-build-matrix.outputs.buildConfig }}

  deploy-rating-engine:
    uses: ./.github/workflows/rating_engine_deploy.yml
    needs: [set-build-matrix, build-rating-engine]
    secrets: inherit
    with:
      buildConfig: ${{ needs.set-build-matrix.outputs.buildConfig }}

  build-opensips-scheduler:
    uses: ./.github/workflows/opensips_scheduler_build.yml
    needs: [set-build-matrix]
    secrets: inherit
    with:
      packageMatrix: ${{ needs.set-build-matrix.outputs.amd64PackageMatrix }}

  build-s3-mpeg:
    uses: ./.github/workflows/s3_mpeg_build.yml
    needs: [set-build-matrix, s3-mpeg-tests]
    secrets: inherit
    with:
      packageMatrix: ${{ needs.set-build-matrix.outputs.arm64PackageMatrix }}

  deploy-s3-mpeg:
    uses: ./.github/workflows/s3_mpeg_deploy.yml
    needs: [set-build-matrix, build-s3-mpeg]
    secrets: inherit
    with:
      buildConfig: ${{ needs.set-build-matrix.outputs.buildConfig }}

